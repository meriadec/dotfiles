include ./nord.conf

allow_remote_control  yes
confirm_os_window_close 0

# Berkeley Mono OTF exposes its coding substitutions through `calt`.
# Use kitty's exact font-spec syntax so the feature is attached to the main font,
# not only to fallback fonts.
font_family           postscript_name=BerkeleyMono-SemiCondensed features="+calt"
bold_font             postscript_name=BerkeleyMono-BoldSemiCondensed features="+calt"
italic_font           postscript_name=BerkeleyMono-SemiCondensedOblique features="+calt"
bold_italic_font      postscript_name=BerkeleyMono-BoldSemiCondensedOblique features="+calt"
font_size             16

# Never suppress programming ligatures/contextual alternates.
disable_ligatures     never
window_padding_width  10.0
enable_audio_bell     no

# cursor_trail          1
# cursor_trail_decay    0.1 0.2

open_url_with         /usr/bin/google-chrome-stable

paste_actions quote-urls-at-prompt

# Disable smooth/inertial scrolling
pixel_scroll no
momentum_scroll 0
