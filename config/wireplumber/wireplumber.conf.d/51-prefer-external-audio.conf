# Prefer external display audio over the laptop speakers.
#
# Polybar's internal/pulseaudio module follows the current default sink. The
# laptop speaker currently has a higher WirePlumber session priority than the
# HDMI/DisplayPort monitor sinks, so it becomes the default even when the bar is
# on the external monitor. Raising HDMI/DisplayPort sinks above the internal
# speaker makes the default output follow connected display audio automatically.
monitor.alsa.rules = [
  {
    matches = [
      {
        media.class = "Audio/Sink"
        node.name = "~alsa_output.*HDMI.*sink"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2000
      }
    }
  }
]
